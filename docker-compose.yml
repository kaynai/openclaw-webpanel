version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001
    networks:
      - openclaw-panel

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - /var/run/docker.sock:/var/run/docker.sock  # 用于 Docker 操作
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/panel.db
    networks:
      - openclaw-panel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  openclaw-panel:
    driver: bridge